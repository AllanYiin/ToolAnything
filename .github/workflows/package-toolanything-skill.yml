name: Package ToolAnything Skill

on:
  push:
    branches:
      - main
    paths-ignore:
      - "skills/toolanything-tool-wrapper/wheels/**"
      - "skills/toolanything-tool-wrapper.skill"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install packaging dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build ToolAnything wheel
        run: python -m build --wheel

      - name: Refresh wheel payload inside skill folder
        run: |
          mkdir -p skills/toolanything-tool-wrapper/wheels
          rm -f skills/toolanything-tool-wrapper/wheels/*.whl
          cp dist/*.whl skills/toolanything-tool-wrapper/wheels/

      - name: Package toolanything-tool-wrapper.skill
        run: python scripts/package_skills.py toolanything-tool-wrapper

      - name: Commit generated wheel and skill bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/toolanything-tool-wrapper/wheels skills/toolanything-tool-wrapper.skill
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh ToolAnything skill bundle"
          git push
