name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-wiki
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WIKI_SSH_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone wiki repository
        run: git clone "git@github.com:AllanYiin/ToolAnything.wiki.git" .wiki-publish

      - name: Sync wiki folder to wiki repository root
        run: rsync -av --delete --exclude ".git" "wiki/" ".wiki-publish/"

      - name: Commit and push wiki changes
        working-directory: .wiki-publish
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes to sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: sync wiki content"
          git push
